# Production stack for Coworkee on a single VPS.
# Run with:  docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coworkee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coworkee
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworkee"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://coworkee:${POSTGRES_PASSWORD}@db:5432/coworkee?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
      DEMO: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage:/app/storage
    networks:
      default:
        # eindeutiger Alias, damit Caddy NUR diese App trifft (nie ein
        # fremder Container, der zufällig auch "app" heißt).
        aliases:
          - coworkee-app

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata: {}
  storage: {}
  caddy_data: {}
  caddy_config: {}
