# Self-host stack for Coworkee — no domain / LAN use (plain HTTP, no Caddy).
# Run from the repo root with:
#   docker compose --env-file deploy/.env -f deploy/docker-compose.selfhost-http.yml up -d --build
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coworkee
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: coworkee
    volumes:
      - coworkee_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworkee"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-3000}:3000"
    volumes:
      - coworkee_storage:/app/storage

volumes:
  coworkee_pgdata:
    name: coworkee_pgdata
  coworkee_storage:
    name: coworkee_storage
